<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essentials - Essentials</title>
  <style>
    
    :root {
      --bg: #ffffff;
      --page: #ffffff;
      --ink: #071426;
      --muted: #4a5568;
      --line: #c9d3df;
      --section: #f4f8fb;
      --accent: #061a33;
      --radius: 8px;
      --shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      --tablet-page-width: 1080px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      line-height: 1.25;
    }

    body {
      padding: 6px;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: var(--tablet-page-width);
      min-height: 760px;
      margin: 0 auto 16px auto;
      background: var(--page);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 8px;
      overflow: visible;
      border: 2px solid var(--accent);
    }

    .home-strip {
      display: block;
      margin: -8px -8px 8px -8px;
      padding: 0;
      background: var(--accent);
      border-radius: 8px 8px 0 0;
      overflow: hidden;
    }

    .home-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      padding: 10px 14px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: 0.08em;
      border: 0;
      border-bottom: 4px solid var(--accent-soft);
      line-height: 1;
    }

    .home-button:hover,
    .home-button:focus {
      background: #ffffff;
      color: var(--accent);
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .block,
    .site-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--ink);
      background: var(--section);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 210px;
      box-shadow: none;
    }

    .block:hover,
    .block:focus,
    .site-card:hover,
    .site-card:focus {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .block img,
    .site-card-image img,
    .image-placeholder {
      width: 100%;
      height: 150px;
      max-height: 150px;
      object-fit: contain;
      object-position: center center;
      background: #ffffff;
      padding: 6px;
      border: 0;
      border-bottom: 1px solid var(--line);
    }

    .site-card-image {
      width: 100%;
      height: 150px;
      max-height: 150px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .site-card-image img {
      height: 100%;
      max-height: 100%;
      border-bottom: 0;
    }

    .image-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
    }

    .block-title,
    .site-card-title {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.08;
      color: #ffffff;
      background: var(--accent);
      overflow-wrap: anywhere;
    }

    .note {
      margin-top: 8px;
      padding: 8px;
      background: var(--section);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      font-size: 0.95rem;
    }

    .note p {
      margin: 0;
    }

    @media print {
      @page {
        size: Letter landscape;
        margin: 0.25in;
      }

      html,
      body {
        background: white;
        font-size: 15px;
      }

      body {
        padding: 0;
      }

      .page {
        width: 100%;
        max-width: none;
        min-height: 0;
        box-shadow: none;
        border-radius: 0;
        padding: 8px;
        margin: 0;
      }

      .home-strip {
        display: none;
      }

      .block,
      .site-card {
        break-inside: avoid;
        box-shadow: none;
      }
    }

    @media screen and (max-width: 850px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media screen and (max-width: 560px) {
      body {
        padding: 5px;
        font-size: 16px;
      }

      .page {
        min-height: 0;
        padding: 6px;
        border-radius: 8px;
      }

      .home-strip {
        margin: -6px -6px 8px -6px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  
  </style>
</head>

<body>
  <main class="page">
    
    <section class="grid">
      <a class="site-card" href="coffee.html">
        <div class="site-card-image">
          <img src="assets/section-images/coffee.png" alt="Coffee">
        </div>
        <div class="site-card-title">Coffee</div>
      </a>
      <a class="site-card" href="juice-cocoa-tea.html">
        <div class="site-card-image">
          <img src="assets/section-images/juice-cocoa-tea.png" alt="Juice / Cocoa / Tea">
        </div>
        <div class="site-card-title">Juice / Cocoa / Tea</div>
      </a>
      <a class="site-card" href="laundry.html">
        <div class="site-card-image">
          <img src="assets/chemical-category-images/laundry.png" alt="Laundry">
        </div>
        <div class="site-card-title">Laundry</div>
      </a>
      <a class="site-card" href="chemical-dispensers.html">
        <div class="site-card-image">
          <img src="assets/section-images/chemical-dispensers.png" alt="Chemical Dispensers">
        </div>
        <div class="site-card-title">Chemical Dispensers</div>
      </a>
      <a class="site-card" href="chemical-products.html">
        <div class="site-card-image">
          <img src="assets/section-images/chemical-products.png" alt="Chemical Products">
        </div>
        <div class="site-card-title">Chemical Products</div>
      </a>
      <a class="site-card" href="part-search.html">
        <div class="site-card-image">
          <img src="assets/section-images/parts-search.png" alt="Part Search">
        </div>
        <div class="site-card-title">Part Search</div>
      </a></section>
  </main>
</body>
</html>
