<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >
  <title>Part Search | Service Essentials</title>
  <style>
    
    :root {
      --bg: #ffffff;
      --page: #ffffff;
      --ink: #071426;
      --muted: #4a5568;
      --line: #c9d3df;
      --section: #f4f8fb;
      --accent: #061a33;
      --accent-2: #e9f7a6;
      --accent-soft: #f4f9d8;
      --accent-soft-blue: #e8eef7;
      --table-row-alt: #f2f7fc;
      --radius: 8px;
      --shadow: 0 3px 10px rgba(0, 0, 0, 0.12);

      --tablet-page-height: 760px;
      --tablet-page-width: 1080px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      line-height: 1.25;
    }

    body {
      padding: 6px;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: var(--tablet-page-width);
      height: var(--tablet-page-height);
      max-height: var(--tablet-page-height);
      margin: 0 auto 16px auto;
      background: var(--page);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 8px;
      overflow: visible;
      page-break-after: always;
      border: 2px solid var(--accent);
    }

    .online-mode .page {
      height: auto;
      max-height: none;
      min-height: var(--tablet-page-height);
    }

    .home-strip {
      display: block;
      margin: -8px -8px 8px -8px;
      padding: 0;
      background: var(--accent);
      border-radius: 8px 8px 0 0;
      overflow: hidden;
    }

    .home-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      padding: 10px 14px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: 0.08em;
      border: 0;
      border-bottom: 4px solid var(--accent-soft);
      line-height: 1;
    }

    .home-button:hover,
    .home-button:focus {
      background: #ffffff;
      color: var(--accent);
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }

    .hero {
      display: block;
      background: #ffffff;
      border-bottom: 4px solid var(--accent);
      padding: 7px 8px;
      margin: 0 -8px 8px -8px;
      border-radius: 0;
    }

    .hero-left {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 3vw, 2.45rem);
      line-height: 1;
      color: var(--accent);
    }

    h2 {
      margin: 0 0 4px;
      font-size: 1.12rem;
      line-height: 1.08;
      color: var(--accent);
    }

    .section-card h2,
    .info-card h2 {
      background: var(--accent);
      color: #ffffff;
      margin: -4px -4px 6px -4px;
      padding: 5px 8px;
      border-radius: 6px 6px 0 0;
    }

    .top-grid {
      display: grid !important;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 8px;
      margin-bottom: 8px;
      align-items: stretch;
    }

    .photo-card,
    .spec-card,
    .info-card,
    .section-card,
    .notice-card {
      border: 1px solid var(--line);
      background: var(--section);
      border-radius: var(--radius);
      padding: 4px;
    }

    .photo-card {
      border: 0px;
      height: 150px;
      min-height: 150px;
      max-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      overflow: hidden;
    }

    .photo-card img {
      height: 150px;
      max-height: 150px;
      max-width: 100%;
      width: auto;
      object-fit: contain;
      object-position: left center;
      border-radius: 4px;
    }

    .photo-placeholder {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
      border: 1px dashed var(--line);
      border-radius: 5px;
      padding: 55px 4px;
      width: 100%;
      text-align: center;
    }

    .spec-card {
      border: 0px;
      height: 150px;
      min-height: 150px;
      max-height: 150px;
      overflow: hidden;
      padding: 4px 6px;
    }

    .spec-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, 1fr);
      gap: 4px;
      height: 100%;
    }

    .spec-item {
      background: white;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 6px 8px;
      min-height: 0;
      overflow: hidden;
    }

    .manuals-spec-item,
    .chemical-tech-spec-item {
      padding: 4px 6px;
    }

    .manuals-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      height: calc(100% - 18px);
      margin-top: 1px;
    }

    .manual-bucket {
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--accent-soft-blue);
      min-width: 0;
      overflow: hidden;
      height: 100%;
      padding: 0;
      margin: 0;
      display: flex;
    }

    .manual-tile,
    .tech-sheet-tile {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: calc(100% - 18px);
      min-height: 30px;
      padding: 0;
      margin: 1px 0 0 0;
      color: var(--accent);
      background: var(--accent-soft-blue);
      border: 1px solid var(--line);
      border-radius: 5px;
      font-weight: 900;
      font-size: 10px;
      line-height: 10px;
      text-align: center;
      text-decoration: none;
      overflow: hidden;
      word-break: break-word;
    }

    .manual-bucket .manual-tile {
      height: 100%;
      margin: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .manual-tile:hover,
    .manual-tile:focus,
    .tech-sheet-tile:hover,
    .tech-sheet-tile:focus {
      background: #ffffff;
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 1px;
    }

    .value {
      display: block;
      font-weight: 800;
      color: var(--ink);
      font-size: 1.02rem;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .summary-table {
      margin-bottom: 8px;
    }

    .summary-table td,
    .summary-table th {
      text-align: left;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .info-card p,
    .section-card p,
    .notice-card p {
      margin: 0;
    }

    .section-card,
    .notice-card {
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 6px;
      overflow: hidden;
      font-size: 1.02rem;
    }

    th {
      background: var(--accent-soft);
      color: var(--accent);
      text-align: left;
      padding: 5px 6px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.08;
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }

    .soft-header th {
      background: var(--accent-soft);
      color: var(--accent);
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }

    tbody tr:nth-child(odd) td {
      background: #ffffff;
    }

    tbody tr:nth-child(even) td {
      background: var(--table-row-alt);
    }

    td {
      border-bottom: 1px solid var(--line);
      padding: 5px 6px;
      vertical-align: top;
      line-height: 1.18;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .summary-description-label {
      background: var(--accent-soft) !important;
      color: var(--accent);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .summary-description-value {
      background: #ffffff !important;
    }

    .parts-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }

    .parts-table th:nth-child(1),
    .parts-table td:nth-child(1) {
      width: calc(12ch + 10px);
      white-space: nowrap;
    }

    .parts-table th:nth-child(2),
    .parts-table td:nth-child(2) {
      width: auto;
    }

    .parts-table th:nth-child(3),
    .parts-table td:nth-child(3) {
      width: 20ch;
      white-space: nowrap;
    }

    .component-table,
    .troubleshooting-table,
    .chemical-packaging-table,
    .chemical-materials-table {
      table-layout: fixed;
    }

    .component-table th:nth-child(1),
    .component-table td:nth-child(1) {
      width: 40%;
    }

    .component-table th:nth-child(2),
    .component-table td:nth-child(2) {
      width: 60%;
    }

    .troubleshooting-table th:nth-child(1),
    .troubleshooting-table td:nth-child(1) {
      width: 35%;
    }

    .troubleshooting-table th:nth-child(2),
    .troubleshooting-table td:nth-child(2) {
      width: 65%;
    }

    .chemical-packaging-table th:nth-child(1),
    .chemical-packaging-table td:nth-child(1) {
      width: 24%;
    }

    .chemical-packaging-table th:nth-child(2),
    .chemical-packaging-table td:nth-child(2) {
      width: 34%;
    }

    .chemical-packaging-table th:nth-child(3),
    .chemical-packaging-table td:nth-child(3) {
      width: 42%;
    }

    .chemical-materials-table th:nth-child(1),
    .chemical-materials-table td:nth-child(1) {
      width: 40%;
    }

    .chemical-materials-table th:nth-child(2),
    .chemical-materials-table td:nth-child(2) {
      width: 60%;
    }

    a {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }

    footer {
      border-top: 2px solid var(--accent);
      margin-top: 6px;
      padding-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 0;
      font-size: 1.02rem;
    }

    .used-on-equipment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
    }

    .used-on-equipment-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 9px;
      background: var(--accent-soft-blue);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--accent);
      font-weight: 900;
      text-decoration: none;
      line-height: 1;
    }

    .used-on-equipment-link:hover,
    .used-on-equipment-link:focus {
      background: var(--accent-soft);
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    @media print {
      .home-strip {
        display: none;
      }
    }

    @media screen and (max-width: 650px) {
      body {
        padding: 5px;
        font-size: 16px;
      }

      .page {
        padding: 6px;
        border-radius: 8px;
        height: auto;
        max-height: none;
        overflow: visible;
      }

      .home-strip {
        margin: -6px -6px 8px -6px;
      }

      .hero {
        margin: 0 -6px 8px -6px;
      }

      .top-grid {
        grid-template-columns: 160px minmax(0, 1fr);
      }

      .photo-card,
      .spec-card {
        height: 120px;
        min-height: 120px;
        max-height: 120px;
      }

      .photo-card img {
        height: 120px;
        max-height: 120px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.95rem;
      }

      th,
      td {
        padding: 4px 5px;
      }
    }
  
    
    body.online-mode {
      min-height: 100vh;
      padding: 6px;
    }

    .online-mode .page {
      height: auto;
      max-height: none;
      min-height: var(--tablet-page-height);
      overflow: visible;
      page-break-after: auto;
      margin-bottom: 0;
    }

    .online-mode footer {
      margin-bottom: 0;
    }
  
    
    .part-link {
      color: var(--accent);
      font-weight: 900;
      text-decoration: none;
      border-bottom: 1px solid rgba(6, 26, 51, 0.35);
    }

    .part-link:hover,
    .part-link:focus {
      color: #2f7d20;
      border-bottom-color: #2f7d20;
    }

    .parts-db-mode .page {
      max-width: 1080px;
    }

    .parts-search-card {
      border: 1px solid var(--line);
      background: var(--section);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 10px;
    }

    .parts-search-card label {
      display: block;
      color: var(--accent);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    #partsSearchInput {
      width: 100%;
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--ink);
      background: #ffffff;
    }

    #partsSearchInput:focus {
      outline: 3px solid var(--accent-soft);
      outline-offset: 1px;
    }

    .parts-search-count {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.95rem;
    }

    .parts-results {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .part-result-card {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .part-result-link {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 10px;
      color: var(--ink);
      text-decoration: none;
      padding: 8px;
    }

    .part-result-link:hover,
    .part-result-link:focus {
      background: var(--accent-soft);
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .part-result-image {
      width: 150px;
      height: 110px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .part-result-image img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .part-result-placeholder {
      color: var(--muted);
      font-weight: 900;
      font-size: 0.9rem;
      text-align: center;
    }

    .part-result-body h2 {
      margin: 0 0 6px 0;
      color: var(--accent);
      font-size: 1.3rem;
      line-height: 1.1;
    }

    .part-result-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px 12px;
      font-size: 0.98rem;
    }

    .part-used-on {
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .part-detail-top-grid {
      grid-template-columns: 300px minmax(0, 1fr);
    }

    .part-photo-card {
      height: 220px;
      min-height: 220px;
      max-height: 220px;
    }

    .part-photo-card img {
      height: 220px;
      max-height: 220px;
    }

    .part-spec-card {
      height: 220px;
      min-height: 220px;
      max-height: 220px;
    }

    .part-spec-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, 1fr);
    }

    @media screen and (max-width: 650px) {
      .part-result-link {
        grid-template-columns: 95px minmax(0, 1fr);
      }

      .part-result-image {
        width: 95px;
        height: 90px;
      }

      .part-result-meta {
        grid-template-columns: 1fr;
      }

      .part-detail-top-grid {
        grid-template-columns: 1fr;
      }

      .part-photo-card,
      .part-spec-card {
        height: auto;
        min-height: 0;
        max-height: none;
      }

      .part-photo-card img {
        height: auto;
        max-height: 240px;
      }
    }
  
  </style>
</head>

<body class="online-mode parts-db-mode">

  <main class="page online-page parts-search-page">

    
    <nav class="home-strip" aria-label="Page navigation">
      <a class="home-button" href="index.html">HOME</a>
    </nav>

    <header class="hero">
      <div class="hero-left">
        <h1>Part Search</h1>
      </div>

    <section class="parts-search-card">
      <label for="partsSearchInput">Search part number, name, manufacturer number, bin, category, or equipment</label>
      <input
        id="partsSearchInput"
        type="search"
        placeholder="Search parts..."
        autocomplete="off"
      >
      <div id="partsSearchCount" class="parts-search-count"></div>
    </section>

    <section id="partsResults" class="parts-results"></section>

  </main>

CTOR, FLEX-GAP","partBin":"Seko Proportioner","manufacturerPartNumber":"9900107203","partCategory":"","partImage":"https://sparetek.com/cdn/shop/files/9900107203-3.jpg","searchKeywords":"","usedOn":["PXB1-4","PXB4-1"],"usedOnDisplay":[{"equipmentId":"PXB1-4","displayName":"Seko - PXB 1-4","equipmentPageFileName":"PXB 1-4.html"},{"equipmentId":"PXB4-1","displayName":"Seko - PXB 4-1","equipmentPageFileName":"PXB 4-1.html"}],"searchText":"14348 yellow, 3.5 gpm eductor, flex-gap seko proportioner 9900107203  https://sparetek.com/cdn/shop/files/9900107203-3.jpg  pxb1-4 pxb4-1 seko - pxb 1-4 seko - pxb 4-1","localImagePath":"https://sparetek.com/cdn/shop/files/9900107203-3.jpg"}];
    const PARTS_LINK_PREFIX = 'parts/';

    const input = document.getElementById('partsSearchInput');
    const results = document.getElementById('partsResults');
    const count = document.getElementById('partsSearchCount');

    function normalizeText(value) {
      return String(value || '').toLowerCase().trim();
    }

    function getPartPageFileName(partNumber) {
      return String(partNumber || '')
        .replace(/[\\/:*?"<>|#%{}~&]/g, '-')
        .replace(/\s+/g, ' ')
        .trim() + '.html';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function partMatchesQuery(part, query) {
      if (!query) {
        return true;
      }

      const terms = query
        .split(/\s+/)
        .map(term => term.trim())
        .filter(Boolean);

      const searchText = normalizeText(part.searchText);

      return terms.every(term => searchText.includes(term));
    }

    function renderParts() {
      const query = normalizeText(input.value);

      const filtered = PARTS_DATA.filter(part => partMatchesQuery(part, query));

      count.textContent = filtered.length + ' part' + (filtered.length === 1 ? '' : 's') + ' found';

      if (filtered.length === 0) {
        results.innerHTML = '<section class="section-card"><p class="empty">No matching parts found.</p></section>';
        return;
      }

      results.innerHTML = filtered.map(part => {
        const imageSrc = String(part.localImagePath || '').trim();
        const usedOn = Array.isArray(part.usedOnDisplay)
          ? part.usedOnDisplay.map(item => item.equipmentId).slice(0, 6).join(', ')
          : '';

        const partPageUrl = PARTS_LINK_PREFIX + getPartPageFileName(part.partNumber);

        return `
          <article class="part-result-card">
            <a class="part-result-link" href="${escapeHtml(partPageUrl)}">
              <div class="part-result-image">
                ${imageSrc
                  ? '<img src="' + escapeHtml(imageSrc) + '" alt="' + escapeHtml(part.partName || part.partNumber) + '" onerror="this.parentElement.innerHTML=\'<div class=&quot;part-result-placeholder&quot;>No Image</div>\';">'
                  : '<div class="part-result-placeholder">No Image</div>'
                }
              </div>

              <div class="part-result-body">
                <h2>${escapeHtml(part.partName || part.partNumber)}</h2>

                <div class="part-result-meta">
                  <span><strong>Part #:</strong> ${escapeHtml(part.partNumber)}</span>
                  <span><strong>MFG #:</strong> ${escapeHtml(part.manufacturerPartNumber)}</span>
                  <span><strong>Bin:</strong> ${escapeHtml(part.partBin)}</span>
                  <span><strong>Category:</strong> ${escapeHtml(part.partCategory)}</span>
                </div>

                ${usedOn
                  ? '<p class="part-used-on"><strong>Used On:</strong> ' + escapeHtml(usedOn) + '</p>'
                  : ''
                }
              </div>
            </a>
          </article>
        `;
      }).join('');
    }

    input.addEventListener('input', renderParts);

    const params = new URLSearchParams(window.location.search);
    const startingQuery = params.get('q');

    if (startingQuery) {
      input.value = startingQuery;
    }

    renderParts();
  </script>
